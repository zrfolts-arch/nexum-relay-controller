<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Nexum Relay Controller</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0a0f1a;
      color: #c8e6ff;
      padding: 20px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ff4d6d;
    }
    .status-dot.running {
      background: #00ff8c;
    }
    button {
      padding: 8px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    #log {
      margin-top: 16px;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      height: 350px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #updateLog {
      margin-top: 16px;
      background: #000;
      color: #7fd4ff;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    h3 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="status-row">
    <div id="statusDot" class="status-dot"></div>
    <span id="statusText">Stopped</span>
  </div>
  <button id="startBtn">Start Server</button>
  <button id="stopBtn">Stop Server</button>
  <button id="openNexumBtn">Open Nexum in Browser</button>
  <div id="log"></div>

  <hr style="margin: 24px 0; border-color: #333;" />

  <h3>Updates</h3>
  <button id="updateAllBtn">⟳ Update All</button>
  <div style="margin-top: 12px; display: flex; gap: 24px;">
    <div>
      <p>Nexum Relay</p>
      <button id="updateRelayBtn">Update</button>
    </div>
    <div>
      <p>Nexum</p>
      <button id="updateNexumBtn">Update</button>
    </div>
    <div>
      <p>Relay Controller</p>
      <button id="updateControllerBtn">Update</button>
    </div>
  </div>
  <div id="updateLog"></div>

  <script src="renderer.js"></script>
</body>
</html>
